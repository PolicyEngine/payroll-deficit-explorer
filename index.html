<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="How much would payroll tax rates need to rise to eliminate the 2036 primary deficit? Interactive PolicyEngine × CBO baseline."
    />
    <meta name="theme-color" content="#2C7A7B" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Payroll tax deficit explorer — PolicyEngine</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2YHG89FY0N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2YHG89FY0N', { tool_name: 'payroll-deficit-explorer' });
    </script>
    <script>
      (function() {
        var TOOL_NAME = 'payroll-deficit-explorer';
        if (typeof window === 'undefined' || !window.gtag) return;

        var scrollFired = {};
        window.addEventListener('scroll', function() {
          var docHeight = document.documentElement.scrollHeight - window.innerHeight;
          if (docHeight <= 0) return;
          var pct = Math.floor((window.scrollY / docHeight) * 100);
          [25, 50, 75, 100].forEach(function(m) {
            if (pct >= m && !scrollFired[m]) {
              scrollFired[m] = true;
              window.gtag('event', 'scroll_depth', { percent: m, tool_name: TOOL_NAME });
            }
          });
        }, { passive: true });

        [30, 60, 120, 300].forEach(function(sec) {
          setTimeout(function() {
            if (document.visibilityState !== 'hidden') {
              window.gtag('event', 'time_on_tool', { seconds: sec, tool_name: TOOL_NAME });
            }
          }, sec * 1000);
        });

        document.addEventListener('click', function(e) {
          var link = e.target && e.target.closest ? e.target.closest('a') : null;
          if (!link || !link.href) return;
          try {
            var url = new URL(link.href, window.location.origin);
            if (url.hostname && url.hostname !== window.location.hostname) {
              window.gtag('event', 'outbound_click', {
                url: link.href,
                target_hostname: url.hostname,
                tool_name: TOOL_NAME
              });
            }
          } catch (err) {}
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
